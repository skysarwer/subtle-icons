name: Deploy Subtle Icons to WordPress.org

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Read local plugin version
        id: version
        shell: bash
        run: |
          PLUGIN_VERSION="$(sed -n "s/^ \* Version:[[:space:]]*//p" subtle-icons.php | head -n1 | tr -d '\r')"
          STABLE_TAG="$(sed -n "s/^Stable tag:[[:space:]]*//p" readme.txt | head -n1 | tr -d '\r')"

          if [ -z "$PLUGIN_VERSION" ]; then
            echo "Could not read Version from subtle-icons.php" >&2
            exit 1
          fi

          if [ -z "$STABLE_TAG" ]; then
            echo "Could not read Stable tag from readme.txt" >&2
            exit 1
          fi

          if [ "$PLUGIN_VERSION" != "$STABLE_TAG" ]; then
            echo "Version mismatch: subtle-icons.php=$PLUGIN_VERSION readme.txt=$STABLE_TAG" >&2
            exit 1
          fi

          echo "value=$PLUGIN_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@2.3.0
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: subtle-icons
          ASSETS_DIR: .wordpress-org
          VERSION: ${{ steps.version.outputs.value }}